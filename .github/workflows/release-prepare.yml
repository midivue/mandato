name: Release Prepare

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled, unlabeled, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  validate-release-source:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is dev
        if: github.head_ref != 'dev'
        run: |
          echo "::error::Pull requests to main must come from the 'dev' branch. Source branch: '${{ github.head_ref }}'"
          exit 1

      - name: Detect release label
        id: label
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "labels=$LABELS"

          if echo "$LABELS" | grep -q '"major"'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"patch"'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "::error::No release label found. Add one of: patch, minor, major"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${CURRENT#v}"
          IFS='.' read -r -a parts <<< "$CURRENT"
          MAJOR="${parts[0]:-0}"
          MINOR="${parts[1]:-0}"
          PATCH="${parts[2]:-0}"

          case "${{ steps.label.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "current=v${CURRENT}" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT (from v${CURRENT} via ${{ steps.label.outputs.bump }} bump)"

      - name: Generate draft release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST \
            --field tag_name="${{ steps.version.outputs.next }}" \
            --field previous_tag_name="${{ steps.version.outputs.current }}" \
            --field target_commitish="${{ github.head_ref }}" \
            --jq '.body')
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const bump = '${{ steps.label.outputs.bump }}';
            const current = '${{ steps.version.outputs.current }}';
            const next = '${{ steps.version.outputs.next }}';
            const notes = `${{ steps.notes.outputs.notes }}`;

            const body = [
              `## Release Preview: \`${next}\``,
              '',
              `| | |`,
              `|---|---|`,
              `| Current version | \`${current}\` |`,
              `| Next version | **\`${next}\`** |`,
              `| Bump type | \`${bump}\` |`,
              '',
              '### Changelog',
              notes,
              '',
              '---',
              '_Merging this PR will create tag `' + next + '` and publish a GitHub Release._',
            ].join('\n');

            const marker = '<!-- release-preview -->';
            const fullBody = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: fullBody,
              });
            }
