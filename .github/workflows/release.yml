name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  create-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.next }}
      sha: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release label
        id: label
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          if echo "$LABELS" | grep -q '"major"'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"patch"'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "::warning::No release label on merged PR — skipping release creation."
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Compute next version
        if: steps.label.outputs.bump != 'none'
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${CURRENT#v}"
          IFS='.' read -r -a parts <<< "$CURRENT"
          MAJOR="${parts[0]:-0}"
          MINOR="${parts[1]:-0}"
          PATCH="${parts[2]:-0}"

          case "${{ steps.label.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "current=v${CURRENT}" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Creating release: $NEXT"

      - name: Tag and create GitHub Release
        if: steps.label.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"

          gh release create "${{ steps.version.outputs.next }}" \
            --title "${{ steps.version.outputs.next }}" \
            --generate-notes \
            --notes-start-tag "${{ steps.version.outputs.current }}" \
            --target main

  deploy-prod:
    needs: create-release
    if: needs.create-release.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build -w app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_TURNSTILE_SITEKEY: ${{ vars.VITE_TURNSTILE_SITEKEY }}
          VITE_COMMIT_HASH: ${{ needs.create-release.outputs.sha }}
          VITE_GIT_TAG: ${{ needs.create-release.outputs.version }}

      - name: Typecheck worker
        run: npx tsc -p worker --noEmit

      - name: Deploy API worker
        run: npx wrangler deploy --env ${{ vars.WRANGLER_ENV }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy frontend to Pages
        run: npx wrangler pages deploy app/dist --project-name ${{ vars.PAGES_PROJECT }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
