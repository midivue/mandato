name: CD

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: dev
        type: choice
        options: [dev, prod]

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build -w app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_TURNSTILE_SITEKEY: ${{ vars.VITE_TURNSTILE_SITEKEY }}
          VITE_COMMIT_HASH: ${{ github.sha }}
          VITE_GIT_TAG: dev

      - name: Typecheck worker
        run: npx tsc -p worker --noEmit

      - name: Deploy API worker
        run: npx wrangler deploy --env ${{ vars.WRANGLER_ENV }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy frontend to Pages
        run: npx wrangler pages deploy app/dist --project-name ${{ vars.PAGES_PROJECT }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-prod:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Resolve build metadata
        id: meta
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: npm run build -w app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_TURNSTILE_SITEKEY: ${{ vars.VITE_TURNSTILE_SITEKEY }}
          VITE_COMMIT_HASH: ${{ github.sha }}
          VITE_GIT_TAG: ${{ steps.meta.outputs.tag }}

      - name: Typecheck worker
        run: npx tsc -p worker --noEmit

      - name: Deploy API worker
        run: npx wrangler deploy --env ${{ vars.WRANGLER_ENV }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy frontend to Pages
        run: npx wrangler pages deploy app/dist --project-name ${{ vars.PAGES_PROJECT }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
